version: "3.7"

services:
  mongo:
    image: mongo
    restart: always
    container_name: mongo_6
    labels:
      - mongo
    ports:
      - "5006:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example

  redis:
    image: redis
    restart: always
    container_name: redis_5
    labels:
      - redis
    ports:
      - "5005:6379"
