version: "3.7"

services:
  mongo:
    image: mongo
    restart: always
    container_name: event_domain_mongo
    labels:
      - mongo
    ports:
      - "27011:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example

  postgres:
    image: postgres
    restart: always
    container_name: event_domain_postgres
    labels:
      - postgres
    ports:
      - "5431:5432"
    environment:
      POSTGRES_DB: default_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: example

  rabbitmq:
    image: rabbitmq
    restart: always
    container_name: event_domain_rabbitmq
    labels:
      - rabbitmq
    ports:
      - "5671:5672"
