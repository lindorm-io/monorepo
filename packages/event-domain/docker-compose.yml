version: "3.7"

services:
  mongo:
    image: mongo
    restart: always
    container_name: event_domain_mongo
    labels:
      - mongo
    ports:
      - "27015:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example

  rabbitmq:
    image: rabbitmq
    restart: always
    container_name: event_domain_rabbitmq
    labels:
      - rabbitmq
    ports:
      - "5671:5672"
