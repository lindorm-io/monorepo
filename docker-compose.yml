version: "3.8"

services:
  mongo:
    image: mongo
    container_name: mongo_dev
    labels:
      - mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - ./.data/mongo:/data/db

  redis:
    image: redis
    container_name: redis_dev
    labels:
      - redis
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/var/lib/redis
