frontend:
  host: localhost
  routes:
    error: /error

oauth:
  client_id: id
  client_secret: secret

oidc_providers: []

redis:
  host: localhost
  port: 6379

server:
  domain: https://lindorm.io
  environment: development
  issuer: https://oidc.lindorm.io
  host: http://localhost
  keys: []
  port: 3000
  workers: false

services:
  identity_service:
    client_name: identityClient
    issuer: https://identity.lindorm.io
    host: http://localhost
  oauth_service:
    client_name: oauthClient
    issuer: https://oauth.lindorm.io
    host: http://localhost
