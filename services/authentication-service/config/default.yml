defaults:
  browser_link_cookie_expiry: 100 years
  consent_session_expiry: 30 minutes
  flow_session_expiry: 15 minutes
  login_session_expiry: 30 minutes
  mfa_cookie_expiry: 75 minutes

frontend:
  host: http://localhost
  routes:
    consent: /consent
    error: /error
    login: /login
    logout: /logout

mongo:
  host: localhost
  port: 27017
  db_name: authentication
  username: username
  password: password

oauth:
  client_id: id
  client_secret: secret

oidc_providers: []

redis:
  host: localhost
  port: 6379
  username: username

server:
  domain: https://lindorm.io
  environment: development
  issuer: https://authentication.lindorm.io
  host: http://localhost
  port: 3000
  keys:
    - secret

services:
  communication_service:
    issuer: https://communication.lindorm.io
    host: http://localhost
  device_service:
    issuer: https://device.lindorm.io
    host: http://localhost
  identity_service:
    issuer: https://identity.lindorm.io
    host: http://localhost
  oauth_service:
    issuer: https://oauth.lindorm.io
    host: http://localhost
