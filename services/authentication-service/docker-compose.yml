version: "3.7"

services:
  service_authentication_mongo:
    image: mongo
    restart: always
    container_name: service_authentication_mongo
    labels:
      - mongo
    ports:
      - "3101:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example

  service_authentication_redis:
    image: redis
    restart: always
    container_name: service_authentication_redis
    labels:
      - redis
    ports:
      - "3102:6379"
