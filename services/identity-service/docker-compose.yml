version: "3.7"

services:
  identity_service_mongo:
    image: mongo
    container_name: identity_service_mongo
    labels:
      - mongo
    ports:
      - "3401:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example

  identity_service_redis:
    image: redis
    container_name: identity_service_redis
    labels:
      - redis
    ports:
      - "3402:6379"
