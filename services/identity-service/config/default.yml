defaults:
  connect_identifier_session_expiry: 2 hours

frontend:
  host: http://localhost
  routes:
    connect_callback: /connect/callback

logger:
  level: info
  colours: false
  readable: false
  timestamp: true

mongo:
  host: localhost
  port: 27017
  db_name: identity_db
  username: root
  password: example

oauth:
  client_id: id
  client_secret: secret

redis:
  host: localhost
  port: 6379
  namespace: identity_service

server:
  domain: https://lindorm.io
  environment: development
  issuer: https://identity.lindorm.io
  host: http://localhost
  keys: []
  port: 3000
  workers: false

services:
  communication_service:
    client_name: communicationClient
    issuer: https://communication.lindorm.io
    host: http://localhost
  oauth_service:
    client_name: oauthClient
    issuer: https://oauth.lindorm.io
    host: http://localhost
