defaults:
  connect_identifier_session_expiry: 2 hours

mongo:
  host: localhost
  port: 27017
  db_name: identity
  username: username
  password: password

oauth:
  client_id: id
  client_secret: secret

redis:
  host: localhost
  port: 6379
  username: username

server:
  domain: https://lindorm.io
  environment: development
  host: http://localhost
  issuer: https://identity.lindorm.io
  keys: []
  port: 3000
  workers: false

services:
  communication_service:
    client_name: communicationClient
    issuer: https://communication.lindorm.io
    host: http://localhost
  oauth_service:
    client_name: oauthClient
    issuer: https://oauth.lindorm.io
    host: http://localhost
