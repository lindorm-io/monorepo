frontend:
  host: http://localhost
  port: 4000

mongo:
  host: localhost
  port: 3501
  db_name: oauth
  username: root
  password: example

oauth:
  client_id: secret

redis:
  host: localhost
  port: 3502

server:
  domain: https://development.lindorm.io
  environment: development
  host: http://localhost
  issuer: https://oauth.development.lindorm.io
  keys:
    - secret
  port: 3500
  workers: true

services:
  authentication_service:
    issuer: https://authentication.development.lindorm.io
    host: http://localhost
    port: 3100
  identity_service:
    issuer: https://identity.development.lindorm.io
    host: http://localhost
    port: 3300
