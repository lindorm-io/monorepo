defaults:
  clients:
    active_state: false
    level_of_assurance: 1
  expiry:
    access_token: 3 minutes
    authorization_session: 30 minutes
    browser_session: 20 hours
    browser_session_remember: 30 days
    client_credentials: 60 seconds
    code_session: 60 seconds
    id_token: 24 hours
    logout_session: 60 seconds
    refresh_session: 30 days
  sessions:
    maximum_days_loa_1: 90
    maximum_days_loa_2: 30
    maximum_days_loa_3: 7
    maximum_days_loa_4: 1
  tenants:
    active_state: false

frontend:
  host: localhost
  routes:
    error: /error

mongo:
  host: localhost
  port: 27017
  db_name: oauth
  username: username
  password: password

oauth:
  client_id: id

redirect:
  login: /oauth/login
  consent: /oauth/consent
  logout: /oauth/logout

redis:
  host: localhost
  port: 6379

server:
  domain: https://lindorm.io
  environment: development
  issuer: https://oauth.lindorm.io
  host: http://localhost
  keys: []
  port: 3000
  workers: false

services:
  authentication_service:
    client_name: authenticationClient
    issuer: https://authentication.lindorm.io
    host: localhost
  identity_service:
    client_name: identityClient
    issuer: https://identity.lindorm.io
    host: localhost
