version: "3.7"

services:
  service_oauth_mongo:
    image: mongo
    restart: always
    container_name: service_oauth_mongo
    labels:
      - mongo
    ports:
      - "3401:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example

  service_oauth_redis:
    image: redis
    restart: always
    container_name: service_oauth_redis
    labels:
      - redis
    ports:
      - "3402:6379"
